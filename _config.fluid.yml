# Fluid Theme Override Config
# Keep only project-specific overrides here.

favicon: /img/avatar.png
apple_touch_icon: /img/avatar.png

navbar:
  blog_title: "Yang的博客"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill", name: "首页" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill", name: "时间轴" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill", name: "分类" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill", name: "标签" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill", name: "关于" }

index:
  slogan:
    enable: true
    text: "编程和游戏小屋"
  post_meta:
    date: true
    category: true
    tag: true
  auto_excerpt:
    enable: true
  post_url_target: _self

footer:
  content: '
    <span>©2026 By Yang</span><br>
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener">HEXO</a>
    <span> | </span>
    <a href="https://github.com/jerryc127/hexo-theme-butterfly" target="_blank" rel="nofollow noopener">Butterfly</a>
    <span> | </span>
    <a href="https://github.com/" target="_blank" rel="nofollow noopener">GitHub</a>
    <span> | </span>
    <a href="/img/avatar.png" target="_blank" rel="noopener">img</a>
  '
  statistics:
    enable: false
    source: "busuanzi"

post:
  updated:
    enable: true
    relative: false
  toc:
    enable: true
    placement: right
    expand_all: true
  meta:
    date:
      enable: true
      format: "YYYY-MM-DD HH:mm"

code:
  copy_btn: true
  language:
    enable: true
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github"
      style_dark: "github-dark"

font:
  font_size: 17px
  code_font_size: 90%

tab_title_separator: " - "

open_graph:
  enable: true
  twitter_card: summary_large_image
