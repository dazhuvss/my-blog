# Fluid Theme Override Config
# Keep only project-specific overrides here.

favicon: /img/avatar.jpg
apple_touch_icon: /img/avatar.jpg

navbar:
  blog_title: "Yang / Notes"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill", name: "首页" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill", name: "归档" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill", name: "分类" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill", name: "标签" }
    - { key: "links", link: "/links/", icon: "iconfont icon-link-fill", name: "链接" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill", name: "关于我" }

index:
  slogan:
    enable: true
    text: "记录学习、项目实践与技术思考"
  post_meta:
    date: true
    category: true
    tag: true
  auto_excerpt:
    enable: true
  post_url_target: _self

footer:
  content: '
    <span>© 2026 Yang · Personal Tech Notes</span>
    <span style="margin:0 12px;color:#CBD5E1;">|</span>
    <a href="https://github.com/dazhuvss" target="_blank" rel="nofollow noopener">GitHub</a>
    <span style="margin:0 12px;color:#CBD5E1;">|</span>
    <a href="/atom.xml" target="_blank" rel="noopener">RSS</a>
    <span style="margin:0 12px;color:#CBD5E1;">|</span>
    <a href="/about/" target="_self" rel="noopener">关于我</a>
  '
  statistics:
    enable: false
    source: "busuanzi"

post:
  updated:
    enable: true
    relative: false
  toc:
    enable: true
    placement: right
    expand_all: true
  meta:
    date:
      enable: true
      format: "YYYY-MM-DD HH:mm"

code:
  copy_btn: true
  language:
    enable: true
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github"
      style_dark: "github-dark"

font:
  font_size: 17px
  code_font_size: 90%

tab_title_separator: " - "

open_graph:
  enable: true
  twitter_card: summary_large_image

